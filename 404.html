<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Buzzed Up</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .site-logo { height: 4.5rem; width: auto; }
    @media (min-width: 768px) { .site-logo { height: 6rem; width: auto; } }
    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10%       { transform: translate(-2%, -3%); }
      30%       { transform: translate(2%, 2%); }
      50%       { transform: translate(-1%, 3%); }
      70%       { transform: translate(3%, -1%); }
      90%       { transform: translate(-2%, 1%); }
    }
    .grain::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: grain 0.5s steps(1) infinite;
      pointer-events: none;
      z-index: 0;
    }
  </style>
  <!-- Google Analytics (loads only after cookie consent) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    if (localStorage.getItem('cookie-consent') === 'accepted') {
      var s = document.createElement('script'); s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-3J9F01KWEY';
      document.head.appendChild(s);
      s.onload = function(){ gtag('js', new Date()); gtag('config', 'G-3J9F01KWEY'); };
    }
  </script>
</head>
<body class="bg-[#2222DD] text-white min-h-screen flex flex-col items-center justify-center grain relative overflow-hidden">

  <div class="relative z-10 text-center px-8">
    <p class="text-[#d1ff68] font-black text-xs uppercase tracking-widest mb-6">Pagina niet gevonden</p>
    <h1 class="font-black leading-none mb-4" style="font-size: clamp(96px, 20vw, 200px);">404</h1>
    <p class="text-blue-200 text-base max-w-sm mx-auto leading-relaxed mb-10">
      Deze pagina bestaat niet (meer). Maar wij wel — en we staan klaar om te helpen.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="index.html" class="bg-[#d1ff68] text-black font-bold px-6 py-3 rounded-full text-sm hover:opacity-90 transition-opacity">← Terug naar home</a>
      <a href="contact.html" class="border-2 border-white/30 text-white font-semibold px-6 py-3 rounded-full text-sm hover:border-white transition-colors">Contact</a>
    </div>
  </div>

</body>
</html>
